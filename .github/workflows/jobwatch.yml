name: jobwatch

on:
  schedule:
    # Weekdays at 12:46 UTC. That is about 8:46am Boston in summer (EDT) and
    # 7:46am in winter (EST). GitHub runs cron in UTC only, so the local time
    # shifts by an hour across daylight saving. GitHub may also delay scheduled
    # runs by a few minutes under load.
    - cron: "46 12 * * 1-5"
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run jobwatch
        run: python3 jobwatch.py

      - name: Email digest (only if matches and secrets are set)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 send_email.py

      - name: Commit results
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "jobwatch@users.noreply.github.com"
          git add seen.json new_jobs_*.md
          git commit -m "jobwatch: $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
