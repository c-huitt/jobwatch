name: jobwatch

on:
  schedule:
    # Two weekday runs: a mid-morning sweep and an afternoon catch-up.
    # Times are UTC (GitHub cron is UTC only), targeting Boston EDT (summer).
    # In winter (EST) each lands one hour earlier. GitHub may also delay
    # scheduled runs by several minutes under load, so treat these as approximate.
    - cron: "7 14 * * 1-5"   # ~10:07am ET (9:07am in winter)
    - cron: "7 20 * * 1-5"   # ~4:07pm ET  (3:07pm in winter)
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run jobwatch
        run: python3 jobwatch.py

      - name: Email digest or heartbeat
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 send_email.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "jobwatch@users.noreply.github.com"
          git add seen.json new_jobs_*.md docs/index.html
          git commit -m "jobwatch: $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 notify_failure.py
