name: jobwatch

on:
  workflow_dispatch: {}   # triggered by cron-job.org at 10am and 4pm ET weekdays

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run jobwatch
        env:
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: python3 jobwatch.py

      - name: Email digest or heartbeat
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 send_email.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "jobwatch@users.noreply.github.com"
          git add seen.json new_jobs_*.md docs/index.html
          git commit -m "jobwatch: $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 notify_failure.py
